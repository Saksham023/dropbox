spring.application.name=dropbox
spring.datasource.url=jdbc:postgresql://localhost:5432/drive_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

storage.r2.account-id=${R2_ACCOUNT_ID:}
storage.r2.access-key-id=${R2_ACCESS_KEY_ID:}
storage.r2.secret-access-key=${R2_SECRET_ACCESS_KEY:}
storage.r2.bucket=${R2_BUCKET:}
storage.r2.presigned-url-expiry-minutes=15

spring.datasource.url=jdbc:h2:mem:dropbox-test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
storage.r2.account-id=test-account
storage.r2.access-key-id=test-access-key
storage.r2.secret-access-key=test-secret-key
storage.r2.bucket=test-bucket
storage.r2.presigned-url-expiry-minutes=15
